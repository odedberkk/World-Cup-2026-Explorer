name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          BLAZE_API_KEY: ${{ secrets.BLAZE_API_KEY }}
          GATE_PASSWORD: ${{ secrets.GATE_PASSWORD }}
        run: |
          if [ -z "$BLAZE_API_KEY" ]; then
            echo "BLAZE_API_KEY repository secret is not set."
            exit 1
          fi

          if [ -z "$GATE_PASSWORD" ]; then
            echo "GATE_PASSWORD repository secret is not set."
            exit 1
          fi

          node scripts/generate-secrets-config.js

          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -r src assets _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
